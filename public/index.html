<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ComfyUI Workflow Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>ComfyUI Workflow Generator</h1>
    <p class="subtitle">Generate workflow JSON from your prompt and import it into ComfyUI.</p>

    <label for="prompt">Prompt</label>
    <textarea id="prompt" placeholder="Example: futuristic city at sunset, volumetric light --ar 16:9 --steps 35 --cfg 8 --neg blurry, lowres"></textarea>

    <label for="provider">Provider</label>
    <select id="provider">
      <option value="local">Local parser (no key)</option>
      <option value="openrouter">OpenRouter (BYOK)</option>
      <option value="openai">OpenAI (BYOK)</option>
      <option value="google">Google Gemini (BYOK)</option>
    </select>

    <label for="template">Workflow Template</label>
    <select id="template">
      <option value="auto">Auto route</option>
      <option value="txt2img">Text to Image</option>
      <option value="img2img">Image to Image</option>
      <option value="upscale">Upscale</option>
    </select>

    <label for="apiKey">API Key (Optional)</label>
    <input id="apiKey" type="password" placeholder="sk-... (optional)" autocomplete="off" />

    <div class="actions">
      <button id="generateBtn">Generate JSON</button>
      <button id="downloadBtn" disabled>Download workflow.json</button>
    </div>
    <p id="status" class="subtitle">Mode: local-parser | Template: txt2img</p>

    <label for="output">Workflow JSON</label>
    <pre id="output">{}</pre>
  </main>

  <script src="app.js"></script>
</body>
</html>
